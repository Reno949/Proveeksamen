<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <title>Flybooking</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>Bestill fly billetter</h1>

    <!-- skjema der bruker skriver inn info -->
    <div class="box">
        <input type="text" id="from" placeholder="Fra (f.eks Oslo)">
        <input type="text" id="to" placeholder="Til (f.eks London)">
        <input type="date" id="date">

        <button onclick="bookFlight()">Bestill</button>
    </div>

    <h2>Dine bestillinger</h2>

    <!-- her vises alle bestillinger --
    <ul id="list"></ul>

    <script src="script.js"></script>
</body>
</html>
